<!DOCTYPE html>
<html>
<body>
<h1> Javascript CLass </h1>



<h2 id="demo"></h2>

<script>


class Dog {
    constructor(name, age, breed) {
        this.name = name;
        this.age = age;
        this.breed = breed;
    }

    bark() {
        console.log(`${this.name} is barking!`);
    }


    getAge() {
        return this.age;
    }

    getBreed() {
        return this.breed;
    }

    getName() {
        return this.name;
    }

    setAge(age) {
        this.age = age;
    }

    setBreed(breed) {
        this.breed = breed;
    }

    setName(name) {
        this.name = name;
    }
}

let dog1 = new Dog("Buddy", 3, "Golden Retriever");
let dog2 = new Dog("Max", 5, "German Shepherd");

dog1.bark();
dog2.bark();

dog1.setAge(4);
dog1.setBreed("Labrador");
console.log(`${dog1.getName()} is ${dog1.getAge()} years old and is a ${dog1.getBreed()}.`);

</script>

</body>
</html>
