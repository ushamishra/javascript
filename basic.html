    <script>

function calculator(operation,nums){  //add , [8,9,10]

   if (operation.toLowerCase() === 'Add') {
    let result = 0;
    for (let i = 0; i < nums.length; i++) {
        result += nums[i]; 
    }
     
    return result;
   
    }

   if (operation.toLowerCase() === 'Substract') { //90,20,5
    let result = nums[0] ;
    for (let i = 1; i < nums.length; i++) {
        result -= nums[i]; 
    }
     
      return result;
    }

    if (operation.toLowerCase() === 'mutiplication') {//5,6,4
    let result = 1;
    for (let i = 0; i < nums.length; i++) {
        result *= nums[i]; 
    }
     
      return result;
    }

    if (operation.toLowerCase() === 'division') {
    let result = 0;
    if(nums.length !== 2 )
     return "Invalid input "
    else {

        result = nums[0]/nums[1]
    }
     
      return result;
    }else{
        return "Invalid operation"
    }
   
}

function callDivide(){

    let num1 = document.getElementById("num1").value
    let num2 = document.getElementById("num2").value
    let numlist = [num1,num2]

    let result = calculator("Division",numlist)

    document.getElementById("divresult").innerHTML = result


}
