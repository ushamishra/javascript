<!DOCTYPE html>
<html>
<body>
<h1>JavaScript Functions</h1>
<h2>The setInterval() Method</h2>

<p>Using setInterval() to display the time every second (1000 milliseconds).</p>

<h2 id="demo"></h2>

<script>
setInterval(myFunction, 1000);

function myFunction() {
  let d = new Date();
  document.getElementById("demo").innerHTML=
  d.getHours() + ":" +
  d.getMinutes() + ":" +
  d.getSeconds();
}
</script>

</body>
</html>
