<html>

<body>

    <header> <h1>Javascript OOPs concept - Encapsulation</h1></header>

    <main>

    <script>
        
    class Person {

        name;
        age;
        gender;
        #bankdetails;
    

        constructor(name, age, gender) {
            this.name = name; //public property
            this.age = age;  //public property
            this.gender = gender;  //public property
            this.#bankdetails = "1234567890"; // private property
        }       

    
    }

    const person = new Person("John Doe", 30, "Male");      
    console.log(person.name); // John Doe
    console.log(person.age); // 30  
    console.log(person.gender)
    console.log(person.bankdetails); // undefined (private property)




   </script>
    </main>


    </body>

</html>
