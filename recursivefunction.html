<html>

<body>

    <header><h1>Recursive function</h1></header>

   

    <main>

        <div>
         <h2>Find the factor for a number</h2>
         <label for="name"> Enter a number:</label>
         <input type="text" placeholder="Enter a number here" name="num">
         <p id="result"></p>

         <button type="button" id="factorbutton" onclick="calculatefactor()">Get the factor!</button>


        </div>
     



         <script>

function calculatefactor(number){  
     var num = document.getElementsByName("num")[0].value
     var result = factor(num)
    document.getElementById("result").innerHTML = "Result :"+result
    
}
 
function factor(num) {//5

    if(num === 0 || num === 1)
        return 1

    return num*factor(num-1) 
      

}
        
 
 
function somefunction(callback) {
    return new Promise((resolve, reject) => {
        setTimeout(() => {
            try {
                callback();
                resolve("done");
            } catch (err) {
                reject(err);
            }
        }, 7000);
    });
}

function myfunction() {
    console.log("this is just test");
}

function test() {
    var mypromise = somefunction(myfunction);

    console.log("my test completed");

    mypromise.then(() => {
        console.log("operation done");
    }).catch(() => {
        console.log("do not print");
    });
}

test();





    </script>


    </main>

    </footer>




</body>
</html>
